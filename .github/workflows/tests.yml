name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.2"
          - "8.3"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Create storage directories
        run: mkdir -p storage/cache storage/logs storage/framework

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run source integrity checks
        run: composer source:check

      - name: Run tests
        run: composer test

      - name: Run documentation quality checks
        run: composer docs:check
